<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Цех №4">
    <meta name="theme-color" content="#0f0c29">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    
    <!-- Иконки -->
    <link rel="icon" href="icons/icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
    <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

    <!-- Splash screens для iOS (рекомендуемые размеры 2025–2026) -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2)" href="icons/splash/320x568.png">
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="icons/splash/375x667.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="icons/splash/414x736.png">
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="icons/splash/375x812.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="icons/splash/414x896.png">
    <link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="icons/splash/414x896@3x.png">

    <title>Калькулятор Цеха №4</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --bg-main: #0a081a;
            --bg-gradient: linear-gradient(160deg, #0f0c29 0%, #1a1a2e 50%, #0f0c29 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-cyan: #00f2ff;
            --accent-gold: #ffc107;
            --accent-green: #00ffaa;
            --text-p: #ffffff;
            --text-s: rgba(255, 255, 255, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); background-image: var(--bg-gradient); min-height: 100vh; padding: 25px 15px; color: var(--text-p); display: flex; justify-content: center; }
        .app-wrapper { width: 100%; max-width: 480px; animation: appAppear 0.6s ease-out; position: relative; }
        @keyframes appAppear { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        header { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid var(--glass-border); padding: 24px; border-radius: 28px; margin-bottom: 20px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        header h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(to right, #fff, var(--text-s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .main-card { background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 30px 25px; border-radius: 35px; border: 1px solid var(--glass-border); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .input-box { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-size: 11px; font-weight: 700; color: var(--text-s); text-transform: uppercase; letter-spacing: 1.5px; padding-left: 5px; }
        .field { position: relative; display: flex; align-items: center; }
        .field .prefix { position: absolute; left: 20px; font-size: 22px; font-weight: 800; color: var(--accent-cyan); opacity: 0.8; }
        input { width: 100%; height: 65px; background: rgba(0, 0, 0, 0.2); border: 2px solid var(--glass-border); border-radius: 20px; padding: 0 20px; color: #fff; font-size: 20px; font-weight: 700; outline: none; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input#density_tail { padding-left: 50px; }
        input:focus { border-color: var(--accent-cyan); background: rgba(0, 242, 255, 0.05); box-shadow: 0 0 20px rgba(0, 242, 255, 0.15); }

        .result-item { margin-top: 15px; padding: 20px; border-radius: 22px; border: 1px solid var(--glass-border); transition: all 0.4s ease; display: none; animation: slideIn 0.4s ease-out forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        .res-primary { background: linear-gradient(145deg, rgba(0, 242, 255, 0.1), rgba(0,0,0,0)); border-left: 5px solid var(--accent-cyan); }
        .res-secondary { background: linear-gradient(145deg, rgba(255, 193, 7, 0.1), rgba(0,0,0,0)); border-left: 5px solid var(--accent-gold); }
        .res-chem { background: rgba(0, 255, 170, 0.03); border: 1px dashed var(--accent-green); }
        .res-label { font-size: 11px; text-transform: uppercase; color: var(--text-s); margin-bottom: 6px; font-weight: 600; }
        .res-data { font-size: 19px; font-weight: 800; color: #fff; }
        .time-tag { display: inline-flex; align-items: center; margin-top: 12px; padding: 6px 12px; background: rgba(0,0,0,0.3); border-radius: 10px; font-size: 12px; font-weight: 600; color: var(--text-p); }

        .footer-info { margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--glass-border); text-align: center; }
        .total-time { font-weight: 700; font-size: 14px; color: var(--accent-cyan); }

        .controls { position: fixed; bottom: 25px; right: 20px; z-index: 1000; display: flex; gap: 12px; }
        .btn-full { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 20px; color: #fff; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .copyright { text-align: center; margin-top: 30px; font-size: 9px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-s); }

        /* Модальное окно */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 28px 24px;
            max-width: 90%;
            width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            color: var(--text-p);
            position: relative;
            animation: modalAppear 0.3s ease-out;
        }
        @keyframes modalAppear { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 28px;
            color: var(--text-s);
            cursor: pointer;
            line-height: 1;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent-cyan);
        }
        .modal-list {
            list-style: none;
            font-size: 15px;
            line-height: 1.7;
        }
        .modal-list li {
            margin-bottom: 12px;
            padding-left: 28px;
            position: relative;
        }
        .modal-list li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-cyan);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header>
        <h1>Калькулятор выдачи</h1>
    </header>

    <div class="main-card">
        <div class="input-box">
            <label>Плотность Раствора</label>
            <div class="field">
                <span class="prefix">1.</span>
                <input type="number" id="density_tail" placeholder="00" inputmode="decimal"
                       oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2); calculate();">
            </div>
        </div>

        <div class="input-box">
            <label>Объём Выдачи (м³)</label>
            <div class="field">
                <input type="number" id="volume_input" placeholder="Введите объём" inputmode="decimal" oninput="calculate();">
            </div>
        </div>

        <div id="res_main" class="result-item res-primary"></div>
        <div id="res_alt" class="result-item res-secondary"></div>
        <div id="res_chem" class="result-item res-chem"></div>

        <div id="footer_area" class="footer-info" style="display:none;">
            <div id="total_time" class="total-time"></div>
        </div>

        <div class="copyright">ЦЕХ № 4 Горшковский РУС</div>
    </div>
</div>

<div class="controls">
    <button id="installBtn" class="btn-full" style="display:none;">📲</button>
    <button class="btn-full" onclick="toggleModal()">ℹ️</button>
</div>

<!-- Модальное окно -->
<div id="infoModal" class="modal-overlay" onclick="toggleModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="toggleModal()">×</span>
        <div class="modal-title">Информация</div>
        <ul class="modal-list">
            <li><strong></strong> Автоматический расчёт выдачи раствора и хим реагентов</li>
            <li><strong></strong> Галит-Нитрат-Скимол-Азол-Гф-Унокем</li>
            <li><strong>Время выдачи</strong> Галит-1 куб 45 сек. Нитрат-1 куб 40 сек. Вода- 1 куб 45 сек.</li>
            <li><strong></strong> <div class="modal-title">Разработчик: Федосеенко М.Ю</div></li>
        </ul>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW error", err));
    }

    function format(v) {
        if (!v || v <= 0) return "0 л";
        const c = Math.floor(v), l = Math.round((v - c) * 1000);
        return c === 0 ? `\( {l} л` : (l === 0 ? ` \){c} м³` : `${c} м³ ${l} л`);
    }

    function time(sec) {
        if (!sec || sec <= 0) return "0 мин 00 сек";
        sec = Math.round(sec);
        const m = Math.floor(sec / 60);
        const s = sec % 60;
        return `${m} мин ${s.toString().padStart(2, '0')} сек`;
    }

    function calculate() {
        const tail = document.getElementById('density_tail').value;
        const v_raw = document.getElementById('volume_input').value;
        const mainCard = document.getElementById('res_main');
        const altCard = document.getElementById('res_alt');
        const chemCard = document.getElementById('res_chem');
        const footer = document.getElementById('footer_area');

        if (tail === "" || v_raw === "" || parseFloat(v_raw) <= 0) {
            mainCard.style.display = "block";
            mainCard.innerHTML = `<div class="res-label">Система</div><div class="res-data" style="font-size:14px; opacity:0.5">Ожидание параметров...</div>`;
            altCard.style.display = "none";
            chemCard.style.display = "none";
            footer.style.display = "none";
            return;
        }

        mainCard.style.display = "block";
        altCard.style.display = "block";
        chemCard.style.display = "block";
        footer.style.display = "block";

        const formattedTail = tail.length === 1 ? "0" + tail : tail;
        const d = parseFloat("1." + formattedTail);
        const v = parseFloat(v_raw) || 0;
        
        let mainVal, altVal, mainTime, altTime, chemHtml;

        if (d <= 1.18) {
            mainVal = v * (d - 1.0) / 0.18; 
            altVal = v - mainVal;
            mainTime = mainVal * 45;
            altTime = altVal * 45;
            chemHtml = `<div class="res-label">Добавки</div><div style="line-height:1.7; font-weight:600">🧪 SCIMOL: ${(v * 0.2067).toFixed(1)} л<br>🧪 АЗОЛ: ${(v * 0.01).toFixed(2)} л<br>🧪 ГФ-1: ${(v * 0.0127).toFixed(3)} л</div>`;
            mainCard.innerHTML = `<div class="res-label">Галит 1.18</div><div class="res-data">${format(mainVal)}</div><div class="time-tag">⏱️ ${time(mainTime)}</div>`;
            altCard.innerHTML = `<div class="res-label">Вода</div><div class="res-data">${format(altVal)}</div><div class="time-tag">⏱️ ${time(altTime)}</div>`;
        } else {
            mainVal = ((1.48 - d) / 0.3) * v;
            altVal = v - mainVal;
            mainTime = mainVal * 45;
            altTime = altVal * 40;
            chemHtml = `<div class="res-label">Добавки</div><div style="line-height:1.7; font-weight:600">🧪 SCIMOL: ${(v * 5.23).toFixed(1)} л<br>🧪 ГФ-1: ${(v * 0.0294).toFixed(3)} л<br>🧪 УноКем: ${(v * 0.1425).toFixed(2)} л</div>`;
            mainCard.innerHTML = `<div class="res-label">Галит 1.18</div><div class="res-data">${format(mainVal)}</div><div class="time-tag">⏱️ ${time(mainTime)}</div>`;
            altCard.innerHTML = `<div class="res-label">Нитрат 1.48</div><div class="res-data">${format(altVal)}</div><div class="time-tag">⏱️ ${time(altTime)}</div>`;
        }

        chemCard.innerHTML = chemHtml;
        document.getElementById('total_time').innerHTML = `⌛ Общее время: ${time(mainTime + altTime)}`;
    }

    function toggleModal(e) {
        const modal = document.getElementById('infoModal');
        if (e && e.target === modal) {
            modal.style.display = 'none';
        } else {
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }
    }

    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'flex';
    });

    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') installBtn.style.display = 'none';
        deferredPrompt = null;
    });

    window.onload = () => {
        const mc = document.getElementById('res_main');
        mc.style.display = "block";
        mc.innerHTML = `<div class="res-label">Статус</div><div class="res-data" style="font-size:14px; opacity:0.5">Готов к расчетам...</div>`;
    };
</script>
</body>
</html>
