<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a081a">
    <title>Калькулятор Цеха №4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-main: #0a081a;
            --bg-gradient: linear-gradient(160deg, #0f0c29 0%, #1a1a2e 50%, #0f0c29 100%);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-cyan: #00f2ff;
            --accent-gold: #ffc107;
            --accent-green: #00ffaa;
            --text-p: #ffffff;
            --text-s: rgba(255, 255, 255, 0.5);
            --dev-blue: #00aaff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-main); background-image: var(--bg-gradient); min-height: 100vh; padding: 20px 15px; color: var(--text-p); display: flex; justify-content: center; }
        
        .app-wrapper { width: 100%; max-width: 480px; position: relative; }
        
        header { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); padding: 20px; border-radius: 24px; margin-bottom: 20px; text-align: center; }
        header h1 { font-size: 16px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #fff; }
        
        .main-card { background: var(--glass); backdrop-filter: blur(25px); padding: 25px; border-radius: 30px; border: 1px solid var(--glass-border); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .input-box { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 10px; font-weight: 700; color: var(--text-s); text-transform: uppercase; letter-spacing: 1.2px; }
        
        .field { position: relative; display: flex; align-items: center; }
        .field .prefix { position: absolute; left: 18px; font-size: 20px; font-weight: 800; color: var(--accent-cyan); }
        
        input { width: 100%; height: 60px; background: rgba(0, 0, 0, 0.3); border: 2px solid var(--glass-border); border-radius: 18px; padding: 0 15px; color: #fff; font-size: 20px; font-weight: 700; outline: none; transition: 0.3s; }
        input#density_tail { padding-left: 45px; }
        input:focus { border-color: var(--accent-cyan); background: rgba(0, 242, 255, 0.05); }
        
        .result-item { margin-top: 15px; padding: 18px; border-radius: 20px; border: 1px solid var(--glass-border); display: none; }
        .res-primary { background: rgba(0, 242, 255, 0.05); border-left: 4px solid var(--accent-cyan); }
        .res-secondary { background: rgba(255, 193, 7, 0.05); border-left: 4px solid var(--accent-gold); }
        .res-chem { background: rgba(0, 255, 170, 0.02); border: 1px dashed var(--accent-green); }
        
        .res-label { font-size: 10px; text-transform: uppercase; color: var(--text-s); margin-bottom: 4px; font-weight: 600; }
        .res-data { font-size: 20px; font-weight: 800; color: #fff; }
        .time-tag { display: inline-flex; align-items: center; margin-top: 10px; padding: 5px 10px; background: rgba(0,0,0,0.4); border-radius: 8px; font-size: 12px; color: #fff; }
        
        .footer-info { margin-top: 20px; text-align: center; }
        .total-time { font-weight: 700; font-size: 14px; color: var(--accent-cyan); }
        .copyright { text-align: center; margin-top: 25px; font-size: 9px; letter-spacing: 2px; color: var(--text-s); text-transform: uppercase; }
        
        /* Кнопка ИНФО */
        .controls { position: fixed; bottom: 20px; right: 20px; z-index: 100; }
        .btn-info { width: 50px; height: 50px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); border-radius: 15px; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: #0f0c29; border: 1px solid var(--glass-border); border-radius: 28px; padding: 25px; max-width: 90%; width: 340px; color: #fff; position: relative; }
        .modal-close { position: absolute; top: 10px; right: 15px; font-size: 28px; color: var(--text-s); cursor: pointer; }
        .modal-title { font-size: 18px; font-weight: 700; text-align: center; margin-bottom: 15px; color: var(--accent-cyan); border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .modal-list { list-style: none; font-size: 14px; line-height: 1.6; }
        .modal-list li { margin-bottom: 10px; padding-left: 20px; position: relative; }
        .modal-list li::before { content: "•"; position: absolute; left: 0; color: var(--accent-cyan); font-weight: bold; }
        .dev-highlight { color: var(--dev-blue); font-weight: 800; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="app-wrapper">
    <header><h1>Калькулятор выдачи</h1></header>
    <div class="main-card">
        <div class="input-box">
            <label>Плотность Раствора</label>
            <div class="field">
                <span class="prefix">1.</span>
                <input type="number" id="density_tail" placeholder="00" inputmode="decimal" oninput="if(this.value.length > 2) this.value = this.value.slice(0, 2); calculate();">
            </div>
        </div>
        <div class="input-box">
            <label>Объём Выдачи (м³)</label>
            <div class="field">
                <input type="number" id="volume_input" placeholder="Введите объём" inputmode="decimal" oninput="calculate();">
            </div>
        </div>

        <div id="res_main" class="result-item res-primary"></div>
        <div id="res_alt" class="result-item res-secondary"></div>
        <div id="res_chem" class="result-item res-chem"></div>

        <div id="footer_area" class="footer-info" style="display:none;">
            <div id="total_time" class="total-time"></div>
        </div>
        <div class="copyright">ЦЕХ № 4 Горшковский РУС</div>
    </div>
</div>

<div class="controls">
    <button class="btn-info" onclick="toggleModal()">ℹ️</button>
</div>

<div id="infoModal" class="modal-overlay" onclick="toggleModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="toggleModal()">×</span>
        <div class="modal-title">Информация</div>
        <ul class="modal-list">
            <li>Приложение для автоматического подсчета</li>
            <li>Выдача раствора по нормам</li>
            <li>Выдача раствора по времени</li>
            <li>Выдача химреагентов по нормам</li>
            <li style="text-align:center; margin-top:20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top:15px;">
                Разработчик: <span class="dev-highlight">Федосеенко М. Ю.</span>
            </li>
        </ul>
    </div>
</div>

<script>
    function toggleModal(e) {
        const modal = document.getElementById('infoModal');
        if (e && e.target === modal) {
            modal.style.display = 'none';
        } else {
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }
    }

    // Исправленная функция: 10 кубов теперь это ровно 10 м3
    function format(v) {
        if (v === undefined || v < 0.001) return "0 л";
        let totalLiters = Math.round(v * 1000);
        let c = Math.floor(totalLiters / 1000);
        let l = totalLiters % 1000;
        if (c === 0) return `${l} л`;
        if (l === 0) return `${c} м³`;
        return `${c} м³ ${l} л`;
    }

    function time(sec) {
        if (!sec || sec <= 0) return "0 мин 00 сек";
        sec = Math.round(sec);
        return `${Math.floor(sec / 60)} мин ${(sec % 60).toString().padStart(2, '0')} сек`;
    }

    function calculate() {
        const tailInput = document.getElementById('density_tail').value;
        const vRaw = document.getElementById('volume_input').value;
        const mainCard = document.getElementById('res_main');
        const altCard = document.getElementById('res_alt');
        const chemCard = document.getElementById('res_chem');
        const footer = document.getElementById('footer_area');

        if (tailInput === "" || vRaw === "" || parseFloat(vRaw) <= 0) {
            mainCard.style.display = "block";
            mainCard.innerHTML = `<div class="res-label">Система</div><div class="res-data" style="font-size:14px; opacity:0.5">Ожидание данных...</div>`;
            altCard.style.display = "none"; chemCard.style.display = "none"; footer.style.display = "none";
            return;
        }

        const v = parseFloat(vRaw);
        const d = parseFloat("1." + (tailInput.length === 1 ? "0" + tailInput : tailInput));
        
        let mVal, aVal, mTime, aTime, chem, mLab, aLab;

        if (d <= 1.18) {
            // Исправленная логика граничного значения
            mVal = (d >= 1.18) ? v : v * (d - 1.0) / 0.18;
            aVal = Math.max(0, v - mVal);
            mTime = mVal * 45; aTime = aVal * 45;
            mLab = "Галит 1.18"; aLab = "Вода";
            chem = `🧪 SCIMOL: ${(v * 0.2067).toFixed(1)} л<br>🧪 АЗОЛ: ${(v * 0.01).toFixed(2)} л<br>🧪 ГФ-1: ${(v * 0.0127).toFixed(3)} л`;
        } else {
            mVal = ((1.48 - d) / 0.3) * v;
            aVal = Math.max(0, v - mVal);
            mTime = mVal * 45; aTime = aVal * 40;
            mLab = "Галит 1.18"; aLab = "Нитрат 1.48";
            chem = `🧪 SCIMOL: ${(v * 5.23).toFixed(1)} л<br>🧪 ГФ-1: ${(v * 0.0294).toFixed(3)} л<br>🧪 УноКем: ${(v * 0.1425).toFixed(2)} л`;
        }

        mainCard.style.display = "block";
        altCard.style.display = "block";
        chemCard.style.display = "block";
        footer.style.display = "block";

        mainCard.innerHTML = `<div class="res-label">${mLab}</div><div class="res-data">${format(mVal)}</div><div class="time-tag">⏱️ ${time(mTime)}</div>`;
        altCard.innerHTML = `<div class="res-label">${aLab}</div><div class="res-data">${format(aVal)}</div><div class="time-tag">⏱️ ${time(aTime)}</div>`;
        chemCard.innerHTML = `<div class="res-label">Добавки</div><div style="line-height:1.6; font-weight:600; font-size:14px;">${chem}</div>`;
        document.getElementById('total_time').innerHTML = `⌛ Общее время: ${time(mTime + aTime)}`;
    }

    window.onload = () => {
        const mc = document.getElementById('res_main');
        mc.style.display = "block";
        mc.innerHTML = `<div class="res-label">Статус</div><div class="res-data" style="font-size:14px; opacity:0.5">Готов к работе</div>`;
    };
</script>
</body>
</html>
